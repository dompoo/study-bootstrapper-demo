name: 스터디자료 업로드
description: PDF와 메타데이터를 입력하면 .automation/sessions.yml과 README가 자동으로 갱신됩니다
title: "[업로드] "
body:
  - type: markdown
    attributes:
      value: |
        스터디자료를 업로드합니다. 이슈를 제출하면 자동으로 처리되고 완료 후 close 됩니다.
        제목은 그대로 두셔도 됩니다 — 처리 후 `[업로드] N회차 - 스터디원 / 제목` 형식으로 자동 갱신됩니다.

  - type: input
    id: session
    attributes:
      label: 회차
      description: 숫자만 입력해주세요 (예 17)
      placeholder: "17"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: 스터디 일자
      description: YYYY-MM-DD 형식. 해당 회차가 새로 생성될 때만 필수이고, 이미 등록된 회차에 추가하는 거라면 비워두셔도 됩니다.
      placeholder: "2026-05-03"

  - type: input
    id: presenter
    attributes:
      label: 스터디원
      placeholder: 돔푸
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: 제목
      placeholder: 홈서버 구축기
    validations:
      required: true

  - type: textarea
    id: pdf
    attributes:
      label: PDF 파일
      description: 이 영역에 PDF 파일을 드래그&드롭 해주세요
      placeholder: 여기에 PDF 파일을 드롭하세요
    validations:
      required: true
