name: Process Rollback Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: repo-mutation
  cancel-in-progress: false

jobs:
  process:
    if: |
      startsWith(github.event.issue.title, '[롤백]') &&
      (github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'MEMBER' ||
       github.event.issue.author_association == 'COLLABORATOR' ||
       github.event.issue.author_association == 'CONTRIBUTOR')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install pyyaml

      - name: Process issue
        id: process
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .automation/scripts/process_rollback_issue.py

      - name: Regenerate README
        run: python .automation/scripts/generate_readme.py

      - name: Commit and push
        id: commit
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PRESENTER: ${{ steps.process.outputs.presenter }}
          SESSION: ${{ steps.process.outputs.session }}
          PDF_PATH: ${{ steps.process.outputs.pdf_path }}
          THUMB_PATH: ${{ steps.process.outputs.thumb_path }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .automation/sessions.yml README.md
          [ -n "$PDF_PATH" ] && git add -A -- "$PDF_PATH"
          [ -n "$THUMB_PATH" ] && git add -A -- "$THUMB_PATH"
          if git diff --cached --quiet; then
            echo "nothing to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "docs: ${SESSION}회차 스터디자료 롤백 (${PRESENTER}, #${ISSUE_NUMBER})"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Comment success and close
        if: success() && steps.commit.outputs.committed == 'true'
        uses: actions/github-script@v7
        env:
          PDF_PATH: ${{ steps.process.outputs.pdf_path }}
          THUMB_PATH: ${{ steps.process.outputs.thumb_path }}
          SESSION_DIR_REMOVED: ${{ steps.process.outputs.session_dir_removed }}
          SESSION: ${{ steps.process.outputs.session }}
          PRESENTER: ${{ steps.process.outputs.presenter }}
          TITLE: ${{ steps.process.outputs.title }}
        with:
          script: |
            const lines = ["롤백 완료되었습니다."];
            const pdf = process.env.PDF_PATH;
            const thumb = process.env.THUMB_PATH;
            const sessionDir = process.env.SESSION_DIR_REMOVED;
            if (pdf) lines.push(`- 삭제된 PDF: \`${pdf}\``);
            if (thumb) lines.push(`- 삭제된 썸네일: \`${thumb}\``);
            if (sessionDir) lines.push(`- 빈 회차 디렉터리 제거: \`${sessionDir}\``);
            lines.push("- .automation/sessions.yml / README가 갱신되었습니다.");
            const session = process.env.SESSION;
            const presenter = process.env.PRESENTER;
            const title = process.env.TITLE;
            const newTitle = `[롤백] ${session}회차 - ${presenter} / ${title}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join("\n")
            });
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              title: newTitle,
              state: 'closed',
              state_reason: 'completed'
            });

      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        env:
          ERROR_MSG: ${{ steps.process.outputs.error }}
        with:
          script: |
            const errorMsg = process.env.ERROR_MSG || '';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const quoted = errorMsg.replace(/\n/g, '\n> ');
            const body = errorMsg
              ? `처리 중 오류가 발생했습니다.\n\n> ${quoted}\n\n[워크플로 로그](${runUrl})에서 상세 내용을 확인할 수 있습니다.`
              : `처리 중 오류가 발생했습니다. [워크플로 로그](${runUrl})를 확인해주세요.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
